version: '3.9'

networks:
  unnati-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_certs:
    driver: local

services:

  # ── PostgreSQL + TimescaleDB ──────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: unnati-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unnati}
      POSTGRES_USER: ${POSTGRES_USER:-unnati}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - unnati-net
    ports:
      - "127.0.0.1:5432:5432"   # Localhost only — access via Tailscale
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unnati} -d ${POSTGRES_DB:-unnati}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Redis (Sync Queue + Session Cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: unnati-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - unnati-net
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Unnati Go API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: unnati-api
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-unnati}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-unnati}?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      JWT_SECRET: ${JWT_SECRET}
      GIN_MODE: release
      RUN_MIGRATIONS: "true"
    networks:
      - unnati-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "unnati.service=api"

  # ── Nginx (Reverse Proxy + SSL Termination) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: unnati-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/unnati.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    ports:
      - "80:80"
      - "443:443"
    networks:
      - unnati-net
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Tailscale (Secure Mesh VPN for Remote Access) ─────────────────────────
  # Allows shop owner to access the home server securely from anywhere
  # without port-forwarding or exposing the server to the internet.
  tailscale:
    image: tailscale/tailscale:stable
    container_name: unnati-tailscale
    restart: unless-stopped
    hostname: unnati-homeserver
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTH_KEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # Advertise the API and Postgres ports on the Tailscale network
      TS_EXTRA_ARGS: >-
        --advertise-tags=tag:unnati-server
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host   # Tailscale needs host networking
    privileged: false

  # ── pgAdmin (Database Management — optional, dev only) ────────────────────
  # Comment out in production
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: unnati-pgadmin
    restart: unless-stopped
    profiles:
      - dev    # Only starts with: docker compose --profile dev up
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@unnati.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5050:80"
    networks:
      - unnati-net
    depends_on:
      - postgres
