name: unnati_pos
description: Unnati Retail OS - Local-First POS for Nepal
version: 0.1.0+1
publish_to: 'none'

# Copyright (c) 2026 Walsong Group. All rights reserved.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Local Database (Local-First Core) ─────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Networking (Sync Engine) ──────────────────────────────────────────────
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # ── Background Sync ───────────────────────────────────────────────────────
  workmanager: ^0.5.2

  # ── Printing (ESC/POS Thermal) ────────────────────────────────────────────
  esc_pos_utils_plus: ^2.0.4
  blue_thermal_printer: ^1.2.3     # Bluetooth thermal printer
  usb_serial: ^0.5.2               # USB thermal printer (Windows/Android)

  # ── QR Code (Fonepay) ─────────────────────────────────────────────────────
  qr_flutter: ^4.1.0

  # ── PDF Generation (VAT Invoice) ─────────────────────────────────────────
  pdf: ^3.11.0
  printing: ^5.12.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  decimal: ^2.3.3
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0              # Biometric PIN auth
  crypto: ^3.0.3                  # PIN hashing

  # ── UI ────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  excel: ^4.0.0
  file_picker: ^8.0.2
  nepali_utils: ^3.0.8

dev_dependencies:
  msix: ^3.16.8
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/logo/

msix_config:
  display_name: Unnati Retail OS
  publisher_display_name: Walsong Group
  identity_name: WalsongGroup.UnnatiRetailOS
  msix_version: 1.0.0.0
  description: Local-First POS and Compliance Engine for Nepal
  capabilities: "internetClient"
